<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alluz — Brand Intelligence</title>
  <style>
    :root {
      --blue: #1a7fe8;
      --blue-light: #38b6ff;
      --blue-dim: rgba(56,182,255,0.1);
      --black: #0a1628;
      --bg: #f0f6ff;
      --white: #ffffff;
      --card: #ffffff;
      --border: #dce8f5;
      --muted: #8899aa;
      --text: #1a2a3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { padding: 16px; max-width: 540px; margin: auto; padding-bottom: 80px; }

    /* HEADER */
    .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 14px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-mark { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #38b6ff, #1a6cb8); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; }
    .logo-text { font-size: 18px; letter-spacing: 4px; font-weight: 900; color: var(--black); }
    .logo-tagline { font-size: 8px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .page-label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .menu-btn { background: var(--black); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 11px; font-weight: 800; cursor: pointer; letter-spacing: 0.5px; }

    /* MEMORY BADGE */
    .memory-badge { background: linear-gradient(135deg, #38b6ff15, #1a7fe815); border: 1px solid #38b6ff44; border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .memory-info { font-size: 12px; color: var(--blue); line-height: 1.5; }
    .memory-info b { color: var(--black); }
    .memory-count { font-size: 10px; color: var(--muted); font-weight: 700; background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; }

    /* MENU OVERLAY */
    .menu-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,22,40,0.5); z-index: 200; display: none; backdrop-filter: blur(2px); }
    .menu-overlay.open { display: block; }
    .menu-sheet { position: fixed; top: 0; right: 0; bottom: 0; width: 290px; background: var(--white); z-index: 201; padding: 20px 16px; box-shadow: -4px 0 40px rgba(10,22,40,0.15); transform: translateX(100%); transition: transform 0.25s ease; overflow-y: auto; }
    .menu-sheet.open { transform: translateX(0); }
    .menu-sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .menu-sheet-title { font-size: 12px; font-weight: 900; letter-spacing: 2px; color: var(--black); }
    .menu-close { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 800; cursor: pointer; color: var(--text); }
    .menu-items { display: grid; gap: 8px; }
    .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; text-align: left; width: 100%; font-family: inherit; transition: all 0.15s; }
    .menu-item:hover { background: var(--blue-dim); border-color: var(--blue-light); }
    .menu-item.active-item { background: var(--black); border-color: var(--black); }
    .menu-item.active-item .mi-label { color: #fff; }
    .menu-item.active-item .mi-desc { color: #aabbcc; }
    .mi-icon { width: 36px; height: 36px; border-radius: 8px; background: #fff; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .menu-item.active-item .mi-icon { background: #1a2a3a; border-color: #2a3a4a; }
    .mi-label { font-size: 13px; font-weight: 800; color: var(--black); margin-bottom: 2px; }
    .mi-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* ONBOARDING */
    .onboard-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(26,127,232,0.08); }
    .onboard-hero { background: linear-gradient(135deg, #1a7fe8, #38b6ff); padding: 32px 24px; text-align: center; }
    .onboard-logo { font-size: 28px; letter-spacing: 6px; font-weight: 900; color: #fff; margin-bottom: 4px; }
    .onboard-tagline { font-size: 10px; color: rgba(255,255,255,0.7); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
    .onboard-desc { font-size: 14px; color: rgba(255,255,255,0.9); line-height: 1.7; }
    .onboard-body { padding: 24px; }
    .onboard-step-label { font-size: 10px; font-weight: 800; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
    .onboard-fields { display: grid; gap: 12px; margin-bottom: 20px; }
    .ob-field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
    .ob-input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; font-size: 14px; outline: none; font-family: inherit; background: var(--bg); color: var(--text); }
    .ob-input:focus { border-color: var(--blue-light); background: #fff; }
    .ob-select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; font-size: 14px; outline: none; font-family: inherit; background: var(--bg); color: var(--text); }
    .ob-btn { width: 100%; background: linear-gradient(135deg, #1a7fe8, #38b6ff); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: 800; font-size: 14px; cursor: pointer; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(56,182,255,0.3); }

    /* PROFILE BANNER */
    .profile-banner { background: linear-gradient(135deg, #38b6ff12, #1a7fe808); border: 1px solid #38b6ff33; border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .pb-info { font-size: 12px; color: var(--blue); }
    .pb-info b { color: var(--black); }
    .pb-edit { font-size: 10px; color: var(--blue-light); cursor: pointer; font-weight: 700; background: none; border: none; font-family: inherit; }

    /* SEARCH / ASK */
    .ask-controls { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 14px; box-shadow: 0 3px 16px rgba(26,127,232,0.07); margin-bottom: 18px; position: sticky; top: 10px; z-index: 100; }
    .ask-input { width: 100%; border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; font-size: 15px; outline: none; font-family: inherit; background: var(--bg); color: var(--text); margin-bottom: 9px; }
    .ask-input:focus { border-color: var(--blue-light); background: #fff; }
    .ask-btn { width: 100%; background: var(--black); color: #fff; border: none; padding: 12px; border-radius: 9px; font-weight: 800; font-size: 13px; cursor: pointer; letter-spacing: 0.5px; transition: opacity 0.15s; }
    .ask-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* SUGGESTIONS */
    .suggestions { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
    .sugg { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 6px 13px; font-size: 11px; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .sugg:hover { background: var(--blue-dim); border-color: var(--blue-light); color: var(--blue); }

    /* LOADING */
    .loading { text-align: center; font-size: 10px; font-weight: 900; color: var(--blue); padding: 12px; letter-spacing: 2px; display: none; }
    @keyframes ldot { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
    .ldot { width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block;animation:ldot 1s ease-in-out infinite; }

    /* CARDS */
    .prompt-tag { font-size: 9px; color: var(--muted); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(26,127,232,0.05); }
    .card-label { font-size: 9px; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 5px; }
    .card-title { font-size: 17px; font-weight: 800; color: var(--black); margin-bottom: 8px; line-height: 1.3; }
    .card-text { font-size: 13px; color: var(--muted); line-height: 1.75; margin-bottom: 14px; }

    /* INNER ITEMS */
    .inner-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 13px; margin-bottom: 8px; }
    .inner-name { font-weight: 800; font-size: 14px; color: var(--black); margin-bottom: 6px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 7px; }
    .tag { font-size: 10px; padding: 2px 9px; border-radius: 20px; font-weight: 700; background: var(--blue-dim); color: var(--blue); }
    .tag-g { background: #f0f0f0; color: #667; }
    .inner-note { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 5px; }
    .inner-link { font-size: 12px; color: var(--blue-light); font-weight: 600; }

    /* STEPS */
    .step-item { display: flex; gap: 12px; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
    .step-num { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg,#1a7fe8,#38b6ff); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; flex-shrink: 0; }
    .step-title { font-weight: 800; font-size: 13px; color: var(--black); margin-bottom: 3px; }
    .step-what { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .step-why { font-size: 11px; color: var(--blue); margin-top: 3px; font-style: italic; }

    /* PRICE ROWS */
    .price-row { display: flex; justify-content: space-between; padding: 10px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
    .price-label { font-size: 13px; color: var(--muted); }
    .price-val { font-size: 14px; font-weight: 800; color: var(--blue); font-family: monospace; }
    .advice-box { padding: 12px 14px; background: var(--blue-dim); border-radius: 10px; border-left: 3px solid var(--blue-light); font-size: 13px; color: var(--blue); line-height: 1.7; margin-top: 10px; }

    /* BRAND KIT */
    .brand-el { padding: 10px 13px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
    .bel-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .bel-val { font-size: 13px; color: var(--text); line-height: 1.6; }
    .names-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .name-pill { padding: 6px 14px; background: var(--blue-dim); border: 1px solid #38b6ff44; border-radius: 20px; font-size: 13px; color: var(--blue); font-weight: 700; }

    /* CHECKLIST */
    .check-cat { font-size: 10px; color: var(--blue); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 8px; margin-top: 12px; }
    .check-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 5px; }
    .checkbox { width: 15px; height: 15px; border-radius: 4px; border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 2px; cursor: pointer; transition: all 0.15s; }
    .checkbox.checked { background: var(--blue); border-color: var(--blue); }
    .check-text { font-size: 12px; color: var(--text); line-height: 1.5; }
    .tip-item { padding: 10px 13px; background: var(--blue-dim); border-radius: 9px; border-left: 3px solid var(--blue-light); font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }

    /* CALCULATOR */
    .tool-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px; box-shadow: 0 2px 12px rgba(26,127,232,0.05); }
    .tool-title { font-size: 16px; font-weight: 800; color: var(--black); margin-bottom: 4px; }
    .tool-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
    .tool-field { margin-bottom: 12px; }
    .tool-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; display: block; }
    .tool-input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; font-size: 15px; outline: none; font-family: inherit; background: var(--bg); color: var(--text); }
    .tool-input:focus { border-color: var(--blue-light); background: #fff; }
    .tool-select { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; font-size: 14px; outline: none; font-family: inherit; background: var(--bg); color: var(--text); }
    .tool-btn { width: 100%; background: var(--black); color: #fff; border: none; padding: 13px; border-radius: 9px; font-weight: 800; font-size: 13px; cursor: pointer; letter-spacing: 0.5px; margin-top: 4px; transition: opacity 0.15s; }
    .tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .calc-results { display: grid; gap: 8px; margin-top: 14px; }
    .calc-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; }
    .calc-row.highlight { background: var(--blue-dim); border-color: #38b6ff44; }
    .calc-rlabel { font-size: 13px; color: var(--muted); }
    .calc-rval { font-size: 15px; font-weight: 800; font-family: monospace; }
    .green { color: #16a34a; } .red { color: #dc2626; } .blue-val { color: var(--blue); }

    /* ROLODEX */
    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .filter-btn { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 5px 13px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; color: var(--muted); transition: all 0.15s; }
    .filter-btn.active { background: var(--black); color: #fff; border-color: var(--black); }
    .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

    /* CONTENT PLANNER */
    .platform-toggle { display: flex; gap: 6px; flex-wrap: wrap; }
    .ptoggle { border: 1px solid var(--border); border-radius: 20px; padding: 7px 14px; font-size: 11px; font-weight: 700; cursor: pointer; background: var(--white); font-family: inherit; color: var(--muted); transition: all 0.15s; }
    .ptoggle.active { background: var(--black); color: #fff; border-color: var(--black); }
    .calendar-grid { display: grid; gap: 10px; margin-top: 14px; }
    .cal-day { background: var(--white); border: 1px solid var(--border); border-radius: 11px; padding: 14px; box-shadow: 0 1px 6px rgba(26,127,232,0.04); }
    .cal-day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .cal-day-num { font-size: 10px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .cal-platform { font-size: 9px; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
    .cal-ig { background: #fce4f5; color: #c026a0; }
    .cal-tt { background: #f0f0f0; color: #000; }
    .cal-both { background: var(--blue-dim); color: var(--blue); }
    .cal-type { font-size: 10px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .cal-hook { font-size: 13px; font-weight: 700; color: var(--black); margin-bottom: 5px; line-height: 1.4; }
    .cal-desc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 6px; }
    .cal-caption { font-size: 11px; color: var(--text); font-style: italic; line-height: 1.6; padding: 8px 10px; background: var(--bg); border-radius: 7px; }
    .week-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--text); padding: 10px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }

    /* NAME CHECKER */
    .checker-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .checker-input { flex: 1; border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; font-size: 15px; outline: none; font-family: inherit; background: var(--bg); color: var(--text); }
    .checker-input:focus { border-color: var(--blue-light); background: #fff; }
    .checker-btn { background: var(--black); color: #fff; border: none; border-radius: 9px; padding: 12px 18px; font-weight: 800; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .checker-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .check-results { display: grid; gap: 10px; }
    .check-result-item { background: var(--white); border: 1px solid var(--border); border-radius: 11px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .cri-left { flex: 1; }
    .cri-name { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 3px; }
    .cri-value { font-size: 13px; color: var(--text); font-weight: 600; }
    .cri-note { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
    .status-badge { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .s-green { background: #dcfce7; color: #16a34a; }
    .s-red { background: #fee2e2; color: #dc2626; }
    .s-yellow { background: #fef9c3; color: #ca8a04; }
    .s-grey { background: #f0f0f0; color: #667; }
    .verdict-box { margin-top: 12px; padding: 13px 14px; background: var(--blue-dim); border-radius: 11px; border-left: 3px solid var(--blue-light); }
    .verdict-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--blue); margin-bottom: 5px; }
    .verdict-text { font-size: 13px; color: var(--text); line-height: 1.7; }
    .alts-wrap { margin-top: 12px; }
    .alts-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
    .alt-pills { display: flex; flex-wrap: wrap; gap: 7px; }
    .alt-pill { padding: 6px 13px; background: var(--white); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; color: var(--text); font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .alt-pill:hover { border-color: var(--blue-light); color: var(--blue); background: var(--blue-dim); }

    /* LAUNCH COUNTDOWN */
    .countdown-hero { background: linear-gradient(135deg, #1a7fe8, #38b6ff); border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 14px; color: #fff; }
    .countdown-days { font-size: 56px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
    .countdown-label { font-size: 12px; opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
    .countdown-date { font-size: 13px; opacity: 0.9; }
    .countdown-progress { height: 6px; background: rgba(255,255,255,0.25); border-radius: 3px; margin-top: 16px; }
    .countdown-fill { height: 100%; background: #fff; border-radius: 3px; transition: width 0.5s ease; }
    .week-plan { background: var(--white); border: 1px solid var(--border); border-radius: 11px; padding: 14px; margin-bottom: 10px; }
    .week-plan-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .week-plan-num { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: var(--blue); }
    .week-plan-theme { font-size: 13px; font-weight: 800; color: var(--black); }
    .week-task { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .week-task:last-child { border-bottom: none; }
    .wt-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue-light); flex-shrink: 0; margin-top: 5px; }
    .wt-text { font-size: 12px; color: var(--text); line-height: 1.5; }
    .date-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .date-input { flex: 1; border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px; font-size: 15px; outline: none; font-family: inherit; background: var(--bg); color: var(--text); }
    .date-input:focus { border-color: var(--blue-light); background: #fff; }

    /* PROFILE SETUP */
    .profile-setup { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px; box-shadow: 0 2px 12px rgba(26,127,232,0.05); }
  </style>
</head>
<body>
<div id="root"></div>
<script>
// ── MEMORY SYSTEM ─────────────────────────────────────────────────────────────
// Stores profile + conversation insights that grow over time

let profile = JSON.parse(localStorage.getItem("alluz_profile") || "null");
let memory = JSON.parse(localStorage.getItem("alluz_memory") || '{"insights":[],"interactions":0}');
let history = [];

function saveMemory() {
  localStorage.setItem("alluz_memory", JSON.stringify(memory));
}

function buildMemoryBlock() {
  if (!profile && memory.insights.length === 0) return "";
  let block = "\n\nUSER CONTEXT:";
  if (profile) {
    const stageLabels = {idea:"just has an idea",starting:"just starting out",launched:"recently launched",growing:"growing brand",stuck:"established but stuck and needs a breakthrough",scaling:"scaling fast"};
    block += `\nBrand stage: ${stageLabels[profile.stage]||profile.stage}`;

    if (profile.style) block += `, Aesthetic: ${profile.style}`;
    if (profile.revenue) block += `, Monthly revenue: ${profile.revenue}`;
    if (profile.budget) block += `, Available budget: ${profile.budget}`;
    if (profile.problem) block += `, Biggest problem: ${profile.problem}`;
    if (profile.platforms) block += `, Sells on: ${profile.platforms}`;
  }
  if (memory.insights.length > 0) block += `\nPast context: ${memory.insights.slice(-5).join("; ")}`;
  block += "\nTailor ALL responses specifically to this person's stage and situation. If they're stuck/established, give growth and breakthrough advice not beginner basics. Be direct.";
  return block;
}

    memory.insights.push(insight);
    if (memory.insights.length > 20) memory.insights.shift();
  }
  memory.interactions++;
  saveMemory();
}

async function askAlluz(query) {
  history.push({ role: "user", content: query });
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1500,
      system: SYSTEM + buildMemoryBlock(),
      messages: history
    })
  });
  const data = await res.json();
  const raw = data.content?.find(b => b.type === "text")?.text || '{"type":"answer","title":"Error","text":"Something went wrong.","tips":[]}';
  let parsed;
  try { parsed = JSON.parse(raw.replace(/```json|```/g,"").trim()); }
  catch { parsed = { type:"answer", title:"Response", text:raw, tips:[] }; }
  history.push({ role:"assistant", content: parsed.text||"" });
  await learnFromResponse(query, parsed.text||"");
  return parsed;
}

      catch { return {domain:d,taken:null}; }
    }));
    const aiPrompt = `Clothing brand name: "${name}". Analyse: trademark risk vs known brands, Instagram @${clean} availability, overall verdict. JSON only: {"trademark_risk":"low|medium|high","trademark_note":"","instagram_likely":"available|taken|unknown","instagram_note":"","verdict":"safe|caution|risky","verdict_text":"","alternatives":["","","","",""]}`;
    let aiData = null;
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:aiPrompt}]})});
      const d = await r.json(); const raw=d.content?.find(b=>b.type==="text")?.text||"{}";
      aiData = JSON.parse(raw.replace(/```json|```/g,"").trim());
    } catch{}

    loadingEl.style.display="none";

    // Domains
    const dc = el("div","check-result-item");
    const dl = el("div","cri-left");
    dl.appendChild(el("div","cri-name","Domain Availability"));
    domainResults.forEach(d => {
      const r2=document.createElement("div"); r2.style.cssText="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #eee;";
      const dn=el("span","",""); dn.style.cssText="font-size:13px;color:#334;font-weight:600;"; dn.textContent=d.domain;
      const sb=el("span","status-badge");
      if(d.taken===null){sb.className="status-badge s-grey";sb.textContent="Unknown";}
      else if(d.taken){sb.className="status-badge s-red";sb.textContent="Taken";}
      else{sb.className="status-badge s-green";sb.textContent="Available ✓";}
      r2.appendChild(dn); r2.appendChild(sb); dl.appendChild(r2);
    });
    dc.appendChild(dl); resultsDiv.appendChild(dc);

    if (aiData) {
      const tm=el("div","check-result-item");
      const tl=el("div","cri-left");
      tl.appendChild(el("div","cri-name","Trademark Risk"));
      tl.appendChild(el("div","cri-value",name.toUpperCase()));
      if(aiData.trademark_note) tl.appendChild(el("div","cri-note",aiData.trademark_note));
      const tb=el("span","status-badge");
      if(aiData.trademark_risk==="low"){tb.className="status-badge s-green";tb.textContent="Low Risk ✓";}
      else if(aiData.trademark_risk==="medium"){tb.className="status-badge s-yellow";tb.textContent="Check ⚠️";}
      else{tb.className="status-badge s-red";tb.textContent="High Risk ✗";}
      tm.appendChild(tl); tm.appendChild(tb); resultsDiv.appendChild(tm);

      const ig=el("div","check-result-item");
      const il=el("div","cri-left");
      il.appendChild(el("div","cri-name","Instagram Handle"));
      il.appendChild(el("div","cri-value","@"+clean));
      if(aiData.instagram_note) il.appendChild(el("div","cri-note",aiData.instagram_note+" — verify at instagram.com/"+clean));
      const ib=el("span","status-badge");
      if(aiData.instagram_likely==="available"){ib.className="status-badge s-green";ib.textContent="Likely Free ✓";}
      else if(aiData.instagram_likely==="taken"){ib.className="status-badge s-red";ib.textContent="Likely Taken";}
      else{ib.className="status-badge s-grey";ib.textContent="Verify Manually";}
      ig.appendChild(il); ig.appendChild(ib); resultsDiv.appendChild(ig);

      const vb=el("div","verdict-box");
      const vl=el("div","verdict-label"); vl.textContent=(aiData.verdict==="safe"?"✅ ":aiData.verdict==="caution"?"⚠️ ":"🚫 ")+"AI Verdict";
      vb.appendChild(vl); vb.appendChild(el("div","verdict-text",aiData.verdict_text||""));
      resultsDiv.appendChild(vb);

      if(aiData.alternatives&&aiData.alternatives.length>0) {
        const aw=el("div","alts-wrap");
        aw.appendChild(el("div","alts-label","Alternative Names"));
        const ap=el("div","alt-pills");
        aiData.alternatives.forEach(a => { const p=el("button","alt-pill",a); p.onclick=()=>{input.value=a;runCheck();}; ap.appendChild(p); });
        aw.appendChild(ap); resultsDiv.appendChild(aw);
      }
    }
    btn.disabled=false; btn.textContent="CHECK";
  }
  btn.onclick=runCheck;
  input.addEventListener("keydown",e=>{if(e.key==="Enter")runCheck();});
}

function buildCountdownTab(c) {
  c.innerHTML = "";
  const saved = JSON.parse(localStorage.getItem("alluz_launch")||"null");
  const wrap = el("div","");

  async function generatePlan(launchDate) {
    wrap.innerHTML = "";

    const today = new Date();
    const launch = new Date(launchDate);
    const daysLeft = Math.ceil((launch-today)/(1000*60*60*24));
    const weeksLeft = Math.max(1, Math.ceil(daysLeft/7));
    const pct = Math.max(0, Math.min(100, 100-(daysLeft/90*100)));

    // Hero countdown
    const hero = el("div","countdown-hero");
    hero.appendChild(el("div","countdown-days",""+Math.max(0,daysLeft)));
    hero.appendChild(el("div","countdown-label","Days Until Launch"));
    hero.appendChild(el("div","countdown-date","🚀 "+launch.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})));
    const prog = el("div","countdown-progress");
    const fill = el("div","countdown-fill"); fill.style.width=pct+"%"; prog.appendChild(fill);
    hero.appendChild(prog);
    wrap.appendChild(hero);

    if (daysLeft <= 0) {
      const card = el("div","tool-wrap"); card.style.textAlign="center"; card.style.padding="24px";
      card.appendChild(el("div","","🎉")).style.fontSize="40px";
      const t = el("div","tool-title","Launch Day!"); t.style.marginTop="10px"; card.appendChild(t);
      card.appendChild(el("div","tool-sub","You did it. Time to go live and start selling."));
      wrap.appendChild(card);
      c.appendChild(wrap);
      return;
    }

    // AI plan
    const loadingEl = el("div",""); 
    loadingEl.style.cssText = "text-align:center;padding:24px;";
    loadingEl.innerHTML = `<div style="display:inline-flex;gap:5px;margin-bottom:8px;"><div class="ldot"></div><div class="ldot" style="animation-delay:0.15s"></div><div class="ldot" style="animation-delay:0.3s"></div></div><div style="font-size:11px;font-weight:700;color:var(--blue);letter-spacing:2px;">BUILDING YOUR PLAN...</div>`;
    loadingEl.style.display="block"; wrap.appendChild(loadingEl);
    c.appendChild(wrap);

    const niche = profile ? profile.niche : "clothing brand";
    const prompt = `Create a ${weeksLeft}-week pre-launch plan for a ${niche} clothing brand launching on ${launchDate}. ${weeksLeft} weeks to go. Respond ONLY with raw JSON: {"weeks":[{"week":1,"theme":"","tasks":["task1","task2","task3"]}]} — 3 tasks per week, specific and actionable.`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
      const data = await res.json();
      const raw = data.content?.find(b=>b.type==="text")?.text||"{}";
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      loadingEl.style.display="none";
      (parsed.weeks||[]).forEach(week => {
        const wp = el("div","week-plan");
        const wph = el("div","week-plan-header");
        wph.appendChild(el("div","week-plan-num","Week "+week.week));
        wph.appendChild(el("div","week-plan-theme",week.theme||""));
        wp.appendChild(wph);
        (week.tasks||[]).forEach(task => {
          const wt = el("div","week-task");
          wt.appendChild(el("div","wt-dot",""));
          wt.appendChild(el("div","wt-text",task));
          wp.appendChild(wt);
        });
        wrap.appendChild(wp);
      });
    } catch(e) {
      loadingEl.style.display="none";
      wrap.appendChild(el("div","advice-box","Something went wrong generating your plan. Check connection."));
    }

    // Change date button
    const changeBtn = el("button","tool-btn","Change Launch Date");
    changeBtn.style.marginTop = "12px";
    changeBtn.onclick = () => buildCountdownTab(c);
    wrap.appendChild(changeBtn);
    c.appendChild(wrap);
  }

  if (saved && saved.date) {
    generatePlan(saved.date);
    return;
  }

  // Date picker
  const tw = el("div","tool-wrap");
  tw.appendChild(el("div","tool-title","🚀 Launch Countdown"));
  tw.appendChild(el("div","tool-sub","Set your launch date and get a week-by-week plan to get there. Alluz will personalise it to your brand."));
  const dr = el("div","date-input-row");
  const di = el("input","date-input"); di.type="date"; di.min=new Date().toISOString().split("T")[0];
  const today90 = new Date(); today90.setDate(today90.getDate()+30);
  di.value = today90.toISOString().split("T")[0];
  const setBtn = el("button","checker-btn","SET DATE");
  dr.appendChild(di); dr.appendChild(setBtn); tw.appendChild(dr);
  tw.appendChild(el("div","tool-sub","Tip: Give yourself at least 4 weeks. Most successful launches take 6-8 weeks of prep."));
  wrap.appendChild(tw);
  c.appendChild(wrap);

  setBtn.onclick = () => {
    if (!di.value) return;
    localStorage.setItem("alluz_launch", JSON.stringify({date:di.value}));
    buildCountdownTab(c);
  };
}

function buildProfileTab(c) {
  c.innerHTML = "";
  const setup = el("div","profile-setup");

  setup.appendChild(el("div","tool-title","⚙️ Your Brand Profile"));
  setup.appendChild(el("div","tool-sub","The more Alluz knows about you, the better every answer gets. Be specific — this is your private context."));

  // Stage selector — cards not dropdown
  const stageLabel = el("label","tool-label","Where are you right now?");
  setup.appendChild(stageLabel);

  const STAGES = [
    { id:"idea",       icon:"💡", label:"Just an idea",         desc:"Haven't bought anything yet, still planning" },
    { id:"starting",   icon:"🌱", label:"Just starting out",    desc:"Small budget, first products, learning the ropes" },
    { id:"launched",   icon:"🚀", label:"Launched, early stage",desc:"Store is live, making some sales, building audience" },
    { id:"growing",    icon:"📈", label:"Growing brand",        desc:"Consistent sales, building team, scaling up" },
    { id:"stuck",      icon:"🔒", label:"Established but stuck",desc:"Decent revenue but growth has plateaued, need a breakthrough" },
    { id:"scaling",    icon:"⚡", label:"Scaling fast",         desc:"Strong sales, ready to go to the next level" },
  ];

  let selectedStage = (profile && profile.stage) || "starting";
  const stageGrid = el("div","");
  stageGrid.style.cssText = "display:grid;gap:8px;margin-bottom:16px;margin-top:6px;";

  function renderStages() {
    stageGrid.innerHTML = "";
    STAGES.forEach(s => {
      const item = el("button","");
      const isActive = selectedStage === s.id;
      item.style.cssText = `display:flex;align-items:center;gap:12px;padding:11px 14px;background:${isActive?"var(--black)":"var(--bg)"};border:1px solid ${isActive?"var(--black)":"var(--border)"};border-radius:10px;cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:all 0.15s;`;
      const icon = el("span","",s.icon); icon.style.cssText="font-size:18px;flex-shrink:0;";
      const text = el("div","");
      const lbl = el("div","",s.label); lbl.style.cssText=`font-size:13px;font-weight:800;color:${isActive?"#fff":"var(--black)"};margin-bottom:2px;`;
      const desc = el("div","",s.desc); desc.style.cssText=`font-size:11px;color:${isActive?"#aabbcc":"var(--muted)"};line-height:1.4;`;
      text.appendChild(lbl); text.appendChild(desc);
      item.appendChild(icon); item.appendChild(text);
      item.onclick = () => { selectedStage = s.id; renderStages(); };
      stageGrid.appendChild(item);
    });
  }
  renderStages();
  setup.appendChild(stageGrid);

  const fields = [
    {id:"niche",  label:"Niche / Category",      type:"text",   placeholder:"e.g. Streetwear, Women's casual, Activewear, Luxury basics"},
    {id:"style",  label:"Brand Aesthetic",        type:"text",   placeholder:"e.g. Minimalist, Bold, Streetcore, Y2K, Luxury"},
    {id:"revenue",label:"Current Monthly Revenue",type:"select", options:["$0 — not making sales yet","$1–$500/month","$500–$2k/month","$2k–$10k/month","$10k–$50k/month","$50k+/month"]},
    {id:"budget", label:"Available Budget",       type:"select", options:["Under $200","$200–$500","$500–$1,000","$1,000–$5,000","$5,000–$20,000","$20,000+"]},
    {id:"problem",label:"Biggest challenge right now", type:"select", options:[
      "Don't know where to start",
      "Finding the right suppliers",
      "Pricing my products correctly",
      "Getting traffic and customers",
      "Converting visitors to buyers",
      "Standing out from competitors",
      "Managing inventory and cash flow",
      "Scaling beyond my current level",
      "Building a team and systems",
      "Rebranding or pivoting direction",
    ]},
    {id:"platforms",label:"Where do you sell?",  type:"select", options:["Nowhere yet","Instagram only","TikTok only","Shopify","Etsy","Depop / Poshmark","Multiple platforms","Wholesale / retail stores"]},
  ];

  const inputs = {};
  fields.forEach(f => {
    const fd = el("div","tool-field");
    fd.appendChild(el("label","tool-label",f.label));
    let inp;
    if (f.type==="select") {
      inp = el("select","tool-select");
      f.options.forEach(o => inp.appendChild(el("option","",o)));
    } else {
      inp = el("input","tool-input"); inp.type=f.type; inp.placeholder=f.placeholder||"";
    }
    if (profile && profile[f.id]) inp.value = profile[f.id];
    fd.appendChild(inp); setup.appendChild(fd); inputs[f.id] = inp;
  });

  if (memory.interactions > 0) {
    const memRow = el("div","");
    memRow.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--blue-dim);border:1px solid #38b6ff33;border-radius:10px;margin-bottom:12px;font-size:12px;color:var(--blue);";
    memRow.innerHTML = `🧠 Alluz has learned from <b style="color:var(--black);margin:0 4px">${memory.interactions}</b> conversations`;
    const clearBtn = el("button","","Clear memory");
    clearBtn.style.cssText="background:none;border:none;color:var(--blue-light);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;";
    clearBtn.onclick = () => { memory={insights:[],interactions:0}; saveMemory(); buildProfileTab(c); };
    memRow.appendChild(clearBtn);
    setup.insertBefore(memRow, setup.querySelector(".tool-field"));
  }

  const saveBtn = el("button","tool-btn","SAVE PROFILE");
  saveBtn.onclick = () => {
    profile = {
      niche: inputs.niche.value,
      budget: inputs.budget.value,
      style: inputs.style.value,
      revenue: inputs.revenue.value,
      problem: inputs.problem.value,
      platforms: inputs.platforms.value,
      stage: selectedStage,
    };
    localStorage.setItem("alluz_profile", JSON.stringify(profile));
    // Update AI memory context
    memory.insights.push(`User stage: ${selectedStage}, niche: ${profile.niche}, revenue: ${profile.revenue}, main problem: ${profile.problem}`);
    saveMemory();
    switchTab("ask");
  };
  setup.appendChild(saveBtn);
  c.appendChild(setup);
}

// ── ONBOARDING ─────────────────────────────────────────────────────────────────

function buildOnboarding(c) {
  c.innerHTML = "";
  const wrap = el("div","onboard-wrap");

  const hero = el("div","onboard-hero");
  hero.appendChild(el("div","onboard-logo","ALLUZ"));
  hero.appendChild(el("div","onboard-tagline","Focus · Dominate · Evolve"));
  hero.appendChild(el("div","onboard-desc","Your personal AI for starting and growing a US clothing brand. Let's set up your profile so every answer is built for you."));
  wrap.appendChild(hero);

  const body = el("div","onboard-body");
  body.appendChild(el("div","onboard-step-label","Step 1 of 1 — Your Brand"));
  const fields2 = el("div","onboard-fields");

  const f1=el("div","ob-field"); f1.appendChild(el("label","","What's your niche or style?"));
  const i1=el("input","ob-input"); i1.placeholder="e.g. Streetwear, Women's casual, Activewear"; f1.appendChild(i1); fields2.appendChild(f1);

  const f2=el("div","ob-field"); f2.appendChild(el("label","","Starting budget ($)"));
  const i2=el("input","ob-input"); i2.type="number"; i2.placeholder="e.g. 500"; f2.appendChild(i2); fields2.appendChild(f2);

  const f3=el("div","ob-field"); f3.appendChild(el("label","","Brand aesthetic"));
  const i3=el("input","ob-input"); i3.placeholder="e.g. Minimalist, Bold, Luxury, Streetwear"; f3.appendChild(i3); fields2.appendChild(f3);

  const f4=el("div","ob-field"); f4.appendChild(el("label","","Where are you right now?"));
  const i4=el("select","ob-select");
  ["Just an idea — still planning","Just starting out — small budget","Launched, early stage — building sales","Growing brand — scaling up","Established but stuck — need a breakthrough","Scaling fast — next level"].forEach(o=>i4.appendChild(el("option","",o)));
  f4.appendChild(i4); fields2.appendChild(f4);

  body.appendChild(fields2);

  const startBtn = el("button","ob-btn","START BUILDING MY BRAND →");
  startBtn.onclick = () => {
    profile={niche:i1.value||"clothing brand",budget:i2.value||"500",style:i3.value||"streetwear",stage:i4.value};
    localStorage.setItem("alluz_profile",JSON.stringify(profile));
    const content = document.getElementById("tab-content");
    switchTab("ask");
  };
  body.appendChild(startBtn);
  wrap.appendChild(body);
  c.appendChild(wrap);
}

// ── SWITCH & INIT ─────────────────────────────────────────────────────────────

function switchTab(tab) {
  activeTab = tab;
  const content = document.getElementById("tab-content");
  if (tab==="ask")       buildAskTab(content);
  else if (tab==="calc")      buildCalcTab(content);
  else if (tab==="rolodex")   buildRolodexTab(content);
  else if (tab==="content")   buildContentTab(content);
  else if (tab==="checker")   buildCheckerTab(content);
  else if (tab==="countdown") buildCountdownTab(content);
  else if (tab==="profile")   buildProfileTab(content);
  const feat = FEATURES.find(f=>f.id===tab);
  const lbl = document.getElementById("page-label");
  if (lbl&&feat) lbl.textContent = feat.label;
  document.querySelectorAll(".menu-item").forEach(item => item.classList.toggle("active-item",item.dataset.tab===tab));
}

function openMenu() { document.getElementById("mo").classList.add("open"); document.getElementById("ms").classList.add("open"); }
function closeMenu() { document.getElementById("mo").classList.remove("open"); document.getElementById("ms").classList.remove("open"); }

function init() {
  const root = document.getElementById("root");
  const app = el("div","app");

  // Header
  const header = el("div","header");
  const lw = el("div","logo-wrap");
  const lm = el("div","logo-mark","A"); lw.appendChild(lm);
  const lt = document.createElement("div");
  lt.appendChild(el("div","logo-text","ALLUZ"));
  lt.appendChild(el("div","logo-tagline","Focus · Dominate · Evolve"));
  lw.appendChild(lt);
  const hr = el("div","header-right");
  const pl = el("span","page-label","Ask Alluz"); pl.id="page-label"; hr.appendChild(pl);
  const mb = el("button","menu-btn","☰ Features"); mb.onclick=openMenu; hr.appendChild(mb);
  header.appendChild(lw); header.appendChild(hr);
  app.appendChild(header);

  // Menu overlay + sheet
  const mo = el("div","menu-overlay"); mo.id="mo"; mo.onclick=closeMenu; document.body.appendChild(mo);
  const ms = el("div","menu-sheet"); ms.id="ms";
  const msh = el("div","menu-sheet-header");
  msh.appendChild(el("div","menu-sheet-title","FEATURES"));
  const cb = el("button","menu-close","✕ Close"); cb.onclick=closeMenu; msh.appendChild(cb);
  ms.appendChild(msh);
  const mi2 = el("div","menu-items");
  FEATURES.forEach(f => {
    const item = el("button","menu-item"); item.dataset.tab=f.id;
    const icon = el("div","mi-icon",f.icon);
    const text = el("div","");
    text.appendChild(el("div","mi-label",f.label));
    text.appendChild(el("div","mi-desc",f.desc));
    item.appendChild(icon); item.appendChild(text);
    item.onclick = () => { switchTab(f.id); closeMenu(); };
    mi2.appendChild(item);
  });
  ms.appendChild(mi2); document.body.appendChild(ms);

  // Content
  const content = document.createElement("div"); content.id="tab-content";
  app.appendChild(content);
  root.appendChild(app);

  // First time → onboarding, else → ask
  if (!profile) buildOnboarding(content);
  else switchTab("ask");
}

init();
</script>
